<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cornel & Culinary | Refined Gastronomy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .view-fade { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .gold-border { border-color: #D4AF37; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
    </style>
</head>
<body class="bg-[#FAFAFA] text-slate-900 selection:bg-[#D4AF37] selection:text-white">
    <div id="root"></div>

    <!-- Core Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconNode = window.lucide.icons[name];
                    const attrs = {
                        ...iconNode[1],
                        width: size,
                        height: size,
                        class: `lucide lucide-${name} ${className}`,
                        stroke: "currentColor",
                        "stroke-width": 2,
                        fill: "none"
                    };
                    const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ");
                    const content = iconNode[2].map(child => `<${child[0]} ${Object.entries(child[1]).map(([k, v]) => `${k}="${v}"`).join(" ")} />`).join("");
                    setSvg(`<svg ${attrStr}>${content}</svg>`);
                }
            }, [name, size, className]);
            return <span className="inline-flex" dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [activeTab, setActiveTab] = useState('haccp');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const timer = setTimeout(() => setLoading(false), 800);
                return () => clearTimeout(timer);
            }, []);

            const navigate = (v) => {
                setLoading(true);
                setTimeout(() => {
                    setView(v);
                    setLoading(false);
                    window.scrollTo(0, 0);
                }, 400);
            };

            if (loading && view === 'landing') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                        <div className="text-2xl font-serif mb-4 animate-pulse">Cornel <span className="gold-text">&</span> Culinary</div>
                        <div className="w-12 h-[1px] gold-bg"></div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
                            <div className="flex items-baseline gap-1 cursor-pointer group" onClick={() => navigate('landing')}>
                                <span className="text-2xl font-serif font-black tracking-tight group-hover:gold-text transition-colors">Cornel</span>
                                <span className="gold-text font-light">&</span>
                                <span className="text-[10px] uppercase tracking-[0.4em] font-bold text-slate-400 ml-1">Culinary</span>
                            </div>
                            <nav className="hidden md:flex gap-10 items-center text-[10px] font-black uppercase tracking-[0.2em]">
                                <button onClick={() => navigate('landing')} className="hover:gold-text transition-colors">Heritage</button>
                                <button onClick={() => navigate('vault')} className="hover:gold-text transition-colors">Fellows Vault</button>
                                <button className="bg-slate-900 text-[#D4AF37] px-6 py-3 rounded-full hover:shadow-xl transition-all">Join Fellowship</button>
                            </nav>
                        </div>
                    </header>

                    {view === 'landing' ? (
                        <main className="pt-20 view-fade">
                            <section className="relative h-[85vh] bg-[#0F172A] flex items-center overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&q=80&w=2000" className="absolute inset-0 w-full h-full object-cover opacity-20 grayscale" />
                                <div className="absolute inset-0 bg-gradient-to-r from-slate-950 via-slate-950/80 to-transparent"></div>
                                <div className="relative z-10 max-w-7xl mx-auto px-6 w-full text-white">
                                    <div className="max-w-2xl">
                                        <div className="flex items-center gap-3 mb-6">
                                            <div className="h-px w-6 gold-bg"></div>
                                            <span className="gold-text text-[9px] font-black uppercase tracking-[0.5em]">Executive Series</span>
                                        </div>
                                        <h1 className="text-6xl md:text-8xl font-serif leading-[1.1] mb-8">
                                            Industrial <br/>
                                            <span className="gold-text italic">Excellence</span>
                                        </h1>
                                        <p className="text-slate-400 text-lg font-light mb-10 leading-relaxed border-l border-white/10 pl-6">
                                            High-fidelity Gastronomy systems developed for the modern kitchen architect. Precision at scale.
                                        </p>
                                        <div className="flex flex-col sm:flex-row gap-4">
                                            <button onClick={() => navigate('vault')} className="gold-bg text-slate-950 px-10 py-5 font-black uppercase text-[10px] tracking-[0.2em] hover:bg-white transition-all shadow-2xl">
                                                Fellows Entrance
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </main>
                    ) : (
                        <main className="pt-20 flex-1 flex flex-col lg:flex-row bg-slate-50 view-fade">
                            <aside className="w-full lg:w-72 bg-white border-b lg:border-r border-slate-200 p-6 lg:min-h-[calc(100vh-80px)]">
                                <div className="mb-8 hidden lg:block">
                                    <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest px-4">Navigation</p>
                                </div>
                                <nav className="flex lg:flex-col gap-2 overflow-x-auto lg:overflow-x-visible no-scrollbar">
                                    {['haccp', 'library', 'recipes'].map(id => (
                                        <button 
                                            key={id} 
                                            onClick={() => setActiveTab(id)}
                                            className={`flex items-center gap-4 px-6 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === id ? 'bg-slate-900 text-[#D4AF37] shadow-lg' : 'text-slate-400 hover:text-slate-900'}`}
                                        >
                                            <Icon name={id === 'haccp' ? 'ShieldCheck' : id === 'library' ? 'FileText' : 'ChefHat'} size={18} />
                                            {id}
                                        </button>
                                    ))}
                                </nav>
                            </aside>
                            <section className="flex-1 p-6 md:p-12">
                                {activeTab === 'haccp' ? (
                                    <div className="max-w-4xl bg-white p-10 md:p-16 rounded-[3rem] shadow-sm border border-slate-100">
                                        <h2 className="text-4xl font-serif mb-4">HACCP Integration</h2>
                                        <div className="h-1 w-12 gold-bg mb-8"></div>
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="p-8 border-2 gold-border bg-slate-50 rounded-3xl">
                                                <div className="text-red-500 font-black text-[10px] tracking-widest mb-4">CRITICAL LIMIT</div>
                                                <div className="text-6xl font-black mb-2">75°C</div>
                                                <p className="text-sm text-slate-500 font-light leading-relaxed italic">
                                                    Standard core temperature for high-risk protein stabilization. Verified digital logging required.
                                                </p>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="p-4 bg-slate-50 rounded-2xl flex items-center gap-4">
                                                    <Icon name="Timer" className="gold-text" />
                                                    <span className="text-[10px] font-bold uppercase tracking-wider">15s Hold Time</span>
                                                </div>
                                                <div className="p-4 bg-slate-50 rounded-2xl flex items-center gap-4">
                                                    <Icon name="Activity" className="gold-text" />
                                                    <span className="text-[10px] font-bold uppercase tracking-wider">Real-time Logging</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center justify-center py-32 text-center">
                                        <div className="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center mb-6">
                                            <Icon name="Lock" size={32} className="text-slate-300" />
                                        </div>
                                        <h3 className="text-2xl font-serif mb-2">Fellowship Access Required</h3>
                                        <p className="text-slate-400 text-sm max-w-xs">Industrial recipes and technical papers are locked to the public.</p>
                                    </div>
                                )}
                            </section>
                        </main>
                    )}

                    <footer className="bg-[#0A0A0A] py-12 px-6 border-t border-white/5">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center opacity-40">
                            <div className="text-[10px] text-white font-black uppercase tracking-[0.4em] mb-4 md:mb-0">
                                Cornel & Culinary
                            </div>
                            <div className="text-[9px] text-white uppercase tracking-widest">
                                Established Gastronomy Standards • © 2024
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
